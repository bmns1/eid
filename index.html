<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fdf6e3">
<link rel="manifest" href="manifest.json">
<title>Eid Photo Booth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf6e3;--surf:#f5edda;--surf2:#ebe3cf;
  --gold:#c8880c;--gold2:#a06e08;--goldBright:#f5c540;
  --teal:#0a7a60;--teal2:#086850;
  --text:#1a2e22;--dim:#5a7a68;--dimLight:#8aa898;
  --white:#fff;--card:#fffdf5;
  --rd:#c04040;--green:#1a8a5a;
  --border:rgba(200,136,12,.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);overflow:hidden;overscroll-behavior:none}
button{font-family:inherit;-webkit-appearance:none}

/* ── APP ── */
#app{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:1}

/* ── HEADER — compact ── */
header{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:var(--surf);border-bottom:2px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:6px}
.logo-moon{font-size:24px}
.logo-main{font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:800;color:var(--gold);display:block}
.logo-sub{font-size:9px;color:var(--teal);letter-spacing:2px;text-transform:uppercase;font-weight:800;display:block}
.dots{display:flex;gap:8px}
.dot{width:14px;height:14px;border-radius:50%;background:var(--surf2);border:2px solid var(--dimLight);transition:all .3s}
.dot.lit{background:var(--goldBright);border-color:var(--gold);transform:scale(1.2);box-shadow:0 0 8px rgba(200,136,12,.4)}
.dot.live{background:var(--goldBright);border-color:var(--gold);box-shadow:0 0 12px var(--goldBright);animation:dblink .6s infinite}
@keyframes dblink{0%,100%{opacity:1}50%{opacity:.15}}

/* ── VIEWFINDER — max space ── */
#vf{flex:1;position:relative;overflow:hidden;background:#111}
#vid{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
#fx-canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;pointer-events:none;display:none}
#vid.f-sunny{filter:none}#vid.f-moon{filter:grayscale(1) contrast(1.1)}#vid.f-golden{filter:sepia(.45) saturate(1.35) brightness(1.06)}#vid.f-twilight{filter:hue-rotate(195deg) saturate(.9) brightness(1.04)}#vid.f-vintage{filter:sepia(.65) contrast(.88) brightness(.94) saturate(.75)}#vid.f-festival{filter:contrast(1.45) saturate(1.4) brightness(.88)}#vid.f-glow{filter:brightness(1.15) saturate(1.4) contrast(1.1)}#vid.f-invert{filter:invert(1) hue-rotate(180deg)}#vid.f-mirror{filter:none}#vid.f-pixel{filter:none}

/* Countdown */
#cdown{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s;background:rgba(0,0,0,.3)}
#cdown.show{opacity:1}
#cnum{font-family:'Baloo 2',sans-serif;font-size:220px;font-weight:800;line-height:1;color:var(--goldBright);text-shadow:0 0 80px rgba(245,197,64,.7),0 6px 40px rgba(0,0,0,.8)}
#cnum.pop{animation:cpop .88s ease-out}
@keyframes cpop{0%{transform:scale(2) rotate(-8deg);opacity:0}38%{transform:scale(1) rotate(2deg);opacity:1}100%{transform:scale(.7) rotate(0);opacity:.4}}
.cdown-label{font-family:'Baloo 2',sans-serif;font-size:28px;font-weight:700;color:#fff;margin-top:4px;text-shadow:0 2px 16px rgba(0,0,0,.7)}
#flash{position:absolute;inset:0;z-index:20;background:#fffadc;opacity:0;pointer-events:none}
#flash.go{animation:fwh .5s ease-out forwards}
@keyframes fwh{0%{opacity:.9}100%{opacity:0}}

/* ── FILTER BAR ── */
#fbar{display:flex;overflow-x:auto;flex-shrink:0;background:var(--surf);border-top:1px solid var(--border);scrollbar-width:none;padding:0 2px}
#fbar::-webkit-scrollbar{display:none}
.fb{flex:0 0 auto;padding:8px 14px 7px;font-weight:800;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--dimLight);background:none;border:none;cursor:pointer;position:relative;transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.fb .fi{font-size:18px}
.fb::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:3px;width:0;background:var(--gold);transition:width .2s;border-radius:2px}
.fb.on{color:var(--gold)}.fb.on::after{width:80%}

/* ── BOTTOM CONTROLS ── */
#ctrl{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 12px;background:var(--surf);border-top:2px solid var(--border);flex-shrink:0;gap:8px}
#flipbtn{background:var(--surf2);border:2px solid var(--border);color:var(--dim);cursor:pointer;padding:14px 16px;border-radius:16px;font-size:28px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .18s}
#shutbtn{width:88px;height:88px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#ffdf70,var(--gold));border:4px solid rgba(255,255,255,.5);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 5px var(--surf),0 4px 20px rgba(200,136,12,.3);transition:transform .12s}
#shutbtn:active{transform:scale(.88)}
#shutbtn.busy{background:var(--surf2);box-shadow:0 0 0 5px var(--surf);cursor:not-allowed;opacity:.35}
#shutbtn svg{width:36px;height:36px;fill:var(--text)}
.ctrl-right{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.abtn{background:var(--white);border:2px solid var(--border);color:var(--dim);cursor:pointer;padding:12px 18px;border-radius:14px;font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;white-space:nowrap;transition:all .18s}
.abtn.hi{border-color:var(--teal);color:var(--teal);background:rgba(10,122,96,.06)}

/* ── DECORATE — shows exact 4×6 preview ── */
#dec{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
#dec.open{display:flex}
#dec-head{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surf);border-bottom:2px solid var(--border);flex-shrink:0}
.dec-ht{font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:6px;flex:1}
#dec-clear{background:none;border:2px solid rgba(192,64,64,.3);color:var(--rd);padding:10px 16px;border-radius:12px;cursor:pointer;font-family:'Baloo 2',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase}

/* 4×6 preview canvas */
#dec-preview-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;overflow:hidden;min-height:0;background:var(--surf2)}
#dec-preview{border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12);max-width:100%;max-height:100%;display:block}

/* Sticker bar */
#sbar{flex-shrink:0;padding:8px 8px 6px;background:var(--surf);border-top:2px solid var(--border)}
.srow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.srow::-webkit-scrollbar{display:none}.srow+.srow{margin-top:5px}
.sk{flex:0 0 auto;width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:32px;border-radius:16px;background:var(--white);border:2px solid var(--border);cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .1s,background .15s}
.sk:active{transform:scale(.72);background:var(--surf2)}
.sk.magic{width:auto;padding:0 20px;font-size:17px;gap:6px;font-family:'Baloo 2',sans-serif;font-weight:700;color:var(--gold);border-color:var(--gold);background:rgba(200,136,12,.06)}
.sk.magic:active{transform:scale(.93)}

/* Decorate actions */
#dec-actions{display:flex;gap:12px;padding:10px 14px 14px;background:var(--surf);border-top:2px solid var(--border);flex-shrink:0}
.da{flex:1;padding:20px 8px;border-radius:20px;cursor:pointer;font-family:'Baloo 2',sans-serif;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s;border:none}
.da:active{transform:scale(.94)}
.da.retake{background:var(--white);border:2px solid var(--border);color:var(--dim)}
.da.save{background:radial-gradient(circle at 38% 38%,#ffdf70,var(--gold));color:#fff;box-shadow:0 4px 20px rgba(200,136,12,.3)}

/* ── DRAW TOOLBAR ── */
#draw-bar{flex-shrink:0;padding:6px 8px;background:var(--surf);border-top:2px solid var(--border);display:flex;align-items:center;gap:6px}
#draw-toggle{
  padding:10px 16px;border-radius:14px;cursor:pointer;border:2px solid var(--border);
  font-family:'Baloo 2',sans-serif;font-size:15px;font-weight:700;
  background:var(--white);color:var(--dim);transition:all .15s;display:flex;align-items:center;gap:5px;
}
#draw-toggle.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.draw-colors{display:flex;gap:5px;align-items:center}
.dcolor{
  width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  transition:transform .12s,border-color .15s;flex-shrink:0;
}
.dcolor:active{transform:scale(.85)}
.dcolor.on{border-color:var(--text);transform:scale(1.15)}
.draw-sizes{display:flex;gap:4px;align-items:center;margin-left:2px}
.dsize{
  border-radius:50%;background:var(--text);cursor:pointer;border:2px solid transparent;
  transition:transform .12s;flex-shrink:0;
}
.dsize.on{border-color:var(--gold);transform:scale(1.2)}
#draw-undo{
  padding:8px 14px;border-radius:12px;cursor:pointer;border:2px solid var(--border);
  font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:700;
  background:var(--white);color:var(--dim);margin-left:auto;transition:all .15s;
}
#draw-undo:active{transform:scale(.92)}
#dec-preview-wrap{position:relative}
#dec-preview{position:relative;z-index:1}
.draw-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:700;
  color:rgba(0,0,0,.35);pointer-events:none;z-index:5;
  background:rgba(255,255,255,.7);padding:8px 18px;border-radius:30px;
  opacity:0;transition:opacity .3s;white-space:nowrap;
}
.draw-hint.show{opacity:1}

/* ── TOAST ── */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:16px 36px;border-radius:50px;font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:700;z-index:200;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:32px;text-align:center;overflow:hidden}
.sp-moon{font-size:88px;display:block;margin-bottom:4px}
.sp-h1{font-family:'Baloo 2',sans-serif;font-size:52px;font-weight:800;color:var(--gold);line-height:1}
.sp-h2{font-family:'Baloo 2',sans-serif;font-size:28px;font-weight:700;color:var(--teal);line-height:1}
.sp-sub{font-size:16px;line-height:1.8;color:var(--dim);max-width:340px;margin-top:2px}
#gobtn{margin-top:16px;padding:22px 64px;background:radial-gradient(circle at 38% 38%,#ffdf70,var(--gold));color:#fff;border:none;cursor:pointer;border-radius:60px;font-family:'Baloo 2',sans-serif;font-size:30px;font-weight:800;letter-spacing:2px;box-shadow:0 6px 30px rgba(200,136,12,.3);transition:transform .12s}
#gobtn:active{transform:scale(.94)}#gobtn:disabled{opacity:.35;cursor:not-allowed;transform:none}
#status-card{margin-top:12px;max-width:360px;width:100%;border-radius:16px;overflow:hidden;display:none;text-align:left}
#status-card.show{display:block}
.sc-warn{background:rgba(200,136,12,.08);border:2px solid rgba(200,136,12,.25)}.sc-err{background:rgba(192,64,64,.06);border:2px solid rgba(192,64,64,.2)}
.sc-inner{padding:14px 16px}
.sc-title{font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sc-warn .sc-title{color:var(--gold2)}.sc-err .sc-title{color:var(--rd)}
.sc-body{font-size:13px;line-height:1.7;color:var(--dim)}.sc-body b{color:var(--text);font-weight:700}.sc-body ol{margin:6px 0 0 18px}.sc-body li{margin-bottom:3px}
.sc-body code{background:rgba(0,0,0,.05);padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--teal)}
.serve-tip{margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(200,136,12,.06);border:1px solid rgba(200,136,12,.15);font-size:12px;line-height:1.7;color:var(--dim)}.serve-tip b{color:var(--gold2);font-weight:700}

/* ── GALLERY — full screen, single column, big ── */
#gallery{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
#gallery.open{display:flex}
#gal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surf);border-bottom:2px solid var(--border);flex-shrink:0}
.gal-title{font-family:'Baloo 2',sans-serif;font-size:24px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:8px}
.gal-subtitle{font-size:11px;color:var(--dim);font-weight:800;letter-spacing:1px;text-transform:uppercase}
#gal-close{background:var(--white);border:2px solid var(--border);color:var(--dim);cursor:pointer;padding:14px 22px;border-radius:14px;font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:700;transition:all .18s}
#gal-grid{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:14px;align-items:center;overscroll-behavior:contain}
.gal-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center}
.gal-empty-icon{font-size:56px;opacity:.3}.gal-empty-text{font-size:18px;color:var(--dim);line-height:1.6}
.gal-item{position:relative;border-radius:14px;overflow:hidden;background:#f0ead8;width:100%;max-width:420px;cursor:pointer;transition:transform .12s;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.gal-item:active{transform:scale(.97)}
.gal-item img{width:100%;display:block}
.gal-item-overlay{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:30px 10px 10px}
.gal-item-time{font-size:14px;font-weight:800;color:rgba(255,255,255,.8)}
.gal-del-btn{background:rgba(192,64,64,.85);color:#fff;border:none;padding:12px 18px;border-radius:14px;cursor:pointer;font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;gap:5px;transition:all .12s}
.gal-del-btn:active{transform:scale(.92)}

/* ── PREVIEW ── */
#preview{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px}
#preview.open{display:flex}
#preview img{max-width:96%;max-height:74vh;border-radius:14px;object-fit:contain}
#preview-actions{display:flex;gap:14px;margin-top:18px}
.prev-btn{padding:18px 32px;border-radius:18px;cursor:pointer;font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px;transition:transform .12s;border:none}
.prev-btn:active{transform:scale(.94)}
.prev-close{background:rgba(255,255,255,.15);color:#fff}
.prev-del{background:rgba(192,64,64,.85);color:#fff}

/* ── GALLERY BUTTON (bottom of main screen) ── */
#gal-bar{flex-shrink:0;padding:8px 14px 10px;background:var(--surf);border-top:2px solid var(--border);display:flex;justify-content:center}
.gal-bar-btn{
  width:100%;max-width:400px;padding:16px 24px;border-radius:18px;cursor:pointer;
  font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--white);border:2px solid var(--border);color:var(--dim);
  transition:all .15s;box-shadow:0 2px 10px rgba(0,0,0,.04);
}
.gal-bar-btn:active{transform:scale(.96)}
.gal-bar-btn .gbc{background:var(--gold);color:#fff;font-size:15px;font-weight:800;padding:3px 10px;border-radius:10px;min-width:28px;text-align:center}
</style>
</head>
<body>

<div id="splash">
  <span class="sp-moon">🌙</span>
  <h1 class="sp-h1">Eid Mubarak!</h1>
  <h2 class="sp-h2">Photo Booth 📸</h2>
  <p class="sp-sub">Take 4 fun photos, add stickers, and save your memories!</p>
  <button id="gobtn" onclick="startCam()">LET'S GO! ✨</button>
  <div id="status-card"></div>
</div>

<div id="app">
  <header>
    <div class="logo"><span class="logo-moon">🌙</span><div><span class="logo-main">Eid Booth</span><span class="logo-sub">Photo Booth</span></div></div>
    <div class="dots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
  </header>

  <div id="vf">
    <video id="vid" autoplay playsinline muted class="f-sunny"></video>
    <canvas id="fx-canvas"></canvas>
    <div id="cdown"><span id="cnum">3</span><div class="cdown-label">Get ready!</div></div>
    <div id="flash"></div>
  </div>

  <div id="fbar">
    <button class="fb on" data-f="sunny" onclick="setF(this)"><span class="fi">☀️</span>Sunny</button>
    <button class="fb" data-f="moon" onclick="setF(this)"><span class="fi">🌑</span>Moon</button>
    <button class="fb" data-f="golden" onclick="setF(this)"><span class="fi">✨</span>Golden</button>
    <button class="fb" data-f="twilight" onclick="setF(this)"><span class="fi">🌊</span>Twilight</button>
    <button class="fb" data-f="vintage" onclick="setF(this)"><span class="fi">📜</span>Classic</button>
    <button class="fb" data-f="festival" onclick="setF(this)"><span class="fi">🎆</span>Festival</button>
    <button class="fb" data-f="glow" onclick="setF(this)"><span class="fi">💡</span>Glow</button>
    <button class="fb" data-f="invert" onclick="setF(this)"><span class="fi">🔮</span>Alien</button>
    <button class="fb" data-f="mirror" onclick="setF(this)"><span class="fi">🪞</span>Mirror</button>
    <button class="fb" data-f="pixel" onclick="setF(this)"><span class="fi">👾</span>Pixel</button>
  </div>

  <div id="ctrl">
    <button id="flipbtn" onclick="flipCam()">&#8635;</button>
    <button id="shutbtn" onclick="shoot()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="5" fill="none" stroke="rgba(0,0,0,.3)" stroke-width="1.5"/></svg></button>
    <div class="ctrl-right">
      <button class="abtn hi" id="viewbtn" onclick="openDecorate()" style="display:none">🎨 DECORATE</button>
      <button class="abtn" onclick="resetAll()">RESET</button>
    </div>
  </div>

  <div id="gal-bar">
    <button class="gal-bar-btn" onclick="openGallery()">📁 Saved Photos <span class="gbc" id="gal-count">0</span></button>
  </div>
</div>

<!-- ── DECORATE — shows exact 4×6 preview ── -->
<div id="dec">
  <div id="dec-head">
    <div class="dec-ht">🎨 Decorate!</div>
    <button id="dec-clear" onclick="clearAll()">🗑 CLEAR ALL</button>
  </div>
  <div id="dec-preview-wrap">
    <canvas id="dec-preview"></canvas>
    <div class="draw-hint" id="draw-hint">✏️ Draw with your finger!</div>
  </div>
  <div id="draw-bar">
    <button id="draw-toggle" onclick="toggleDraw()">✏️ Draw</button>
    <div class="draw-colors">
      <div class="dcolor on" style="background:#e04040" onclick="setDrawColor(this,'#e04040')"></div>
      <div class="dcolor" style="background:#f5c540" onclick="setDrawColor(this,'#f5c540')"></div>
      <div class="dcolor" style="background:#18c8a0" onclick="setDrawColor(this,'#18c8a0')"></div>
      <div class="dcolor" style="background:#4488ff" onclick="setDrawColor(this,'#4488ff')"></div>
      <div class="dcolor" style="background:#e060c0" onclick="setDrawColor(this,'#e060c0')"></div>
      <div class="dcolor" style="background:#1a2e22" onclick="setDrawColor(this,'#1a2e22')"></div>
      <div class="dcolor" style="background:#ffffff;border:2px solid #ccc" onclick="setDrawColor(this,'#ffffff')"></div>
    </div>
    <div class="draw-sizes">

// ─── Live FX canvas loop (for mirror & pixel) ──────────
var fxCanvas=document.getElementById('fx-canvas');
var fxCtx=fxCanvas.getContext('2d');
var fxRaf=null;
function startFxLoop(){
  fxCanvas.style.display='block';

    if(!myStream||vid.videoWidth<2){fxRaf=requestAnimationFrame(tick);return;}
    var vw=vid.videoWidth,vh=vid.videoHeight;
    var rect=fxCanvas.parentElement.getBoundingClientRect();
    // Size canvas to display size (no need for hi-res here, perf matters)
    if(fxCanvas.width!==Math.floor(rect.width)||fxCanvas.height!==Math.floor(rect.height)){
      fxCanvas.width=Math.floor(rect.width);fxCanvas.height=Math.floor(rect.height);
    }
    var w=fxCanvas.width,h=fxCanvas.height;
    fxCtx.clearRect(0,0,w,h);

      fxCtx.save();

      var half=Math.floor(w/2);

      fxCtx.imageSmoothingEnabled=true;

  }

}

// Detect if ctx.filter is supported (Safari doesn't support it)

// Manual pixel-level filter fallback for Safari
function applyManualFilter(ctx,w,h,filterName){
  if(filterName==='sunny'||filterName==='mirror'||filterName==='pixel'||filterName==='glow')return; // glow is just brightness+sat, close enough raw
  var id=ctx.getImageData(0,0,w,h);
  var d=id.data;
  for(var i=0;i<d.length;i+=4){
    var r=d[i],g=d[i+1],b=d[i+2];
    if(filterName==='moon'){
      // Grayscale + slight contrast
      var gray=0.299*r+0.587*g+0.114*b;
      gray=((gray-128)*1.1)+128;
      d[i]=d[i+1]=d[i+2]=Math.max(0,Math.min(255,gray));
    }else if(filterName==='golden'){
      // Sepia + warm
      var sr=r*.55+g*.54+b*.34;
      var sg=r*.35+g*.48+b*.26;
      var sb=r*.27+g*.35+b*.24;
      d[i]=Math.min(255,sr*1.35);d[i+1]=Math.min(255,sg*1.35);d[i+2]=Math.min(255,sb*1.06);
    }else if(filterName==='twilight'){
      // Cool blue-purple shift
      d[i]=Math.min(255,r*.7+b*.3);d[i+1]=Math.min(255,g*.85);d[i+2]=Math.min(255,b*.7+r*.35);
    }else if(filterName==='vintage'){
      // Heavy sepia, low contrast
      var vr=r*.5+g*.45+b*.3;
      var vg=r*.35+g*.42+b*.22;
      var vb=r*.28+g*.32+b*.2;
      d[i]=Math.min(255,vr);d[i+1]=Math.min(255,vg);d[i+2]=Math.min(255,vb);
    }else if(filterName==='festival'){
      // High contrast + saturation
      d[i]=Math.max(0,Math.min(255,((r-128)*1.45)+128));
      d[i+1]=Math.max(0,Math.min(255,((g-128)*1.45)+128));
      d[i+2]=Math.max(0,Math.min(255,((b-128)*1.45)+128));
    }else if(filterName==='invert'){
      d[i]=255-r;d[i+1]=255-g;d[i+2]=255-b;
    }
  }
  ctx.putImageData(id,0,0);
}

function grabFrame(){return new Promise(function(res){flash.classList.remove('go');void flash.offsetWidth;flash.classList.add('go');var vw=vid.videoWidth,vh=vid.videoHeight;if(!vw||!vh){res(null);return;}var sc=1,MAX=1280;if(Math.max(vw,vh)>MAX)sc=MAX/Math.max(vw,vh);var w=Math.round(vw*sc),h=Math.round(vh*sc);var c=document.createElement('canvas');c.width=w;c.height=h;var ctx=c.getContext('2d');

    tmp.getContext('2d').drawImage(c,0,0,w,h,0,0,sw,sh);

    ctx.clearRect(0,0,w,h);
    ctx.drawImage(tmp,0,0,sw,sh,0,0,w,h);

});}

async function shoot(){if(busy||!myStream)return;if(photos.length>=4){openDecorate();return;}busy=true;shutbtn.classList.add('busy');while(photos.length<4){updateDots();await doCountdown();var u=await grabFrame();if(u)photos.push(u);updateDots();await sleep(380);}busy=false;shutbtn.classList.remove('busy');updateDots();viewbtn.style.display='block';openDecorate();}

// ══════════════════════════════════════════════════════════
// DECORATE — renders single 4×6 canvas (exact match to saved output)
// ══════════════════════════════════════════════════════════
var decCanvas=document.getElementById('dec-preview');
var photoImgs=[null,null,null,null]; // cached Image objects

function openDecorate(){
  if(!photos.length)return;
  document.getElementById('dec').classList.add('open');
  // Load photo images, then render
  var loaded=0;
  photos.forEach(function(url,i){
    var img=new Image();img.crossOrigin='anonymous';
    img.onload=function(){photoImgs[i]=img;loaded++;if(loaded===photos.length)renderPreview();};
    img.onerror=function(){photoImgs[i]=null;loaded++;if(loaded===photos.length)renderPreview();};
    img.src=url;
  });
}

function renderPreview(){
  // Size canvas to fit container while keeping 2:3 (4×6) ratio
  var wrap=document.getElementById('dec-preview-wrap');
  var wr=wrap.getBoundingClientRect();
  var maxW=wr.width-12,maxH=wr.height-12;
  var ratio=2/3;
  var cw,ch;
  if(maxW/maxH<ratio){cw=Math.floor(maxW);ch=Math.floor(cw/ratio);}
  else{ch=Math.floor(maxH);cw=Math.floor(ch*ratio);}
  var dpr=Math.min(window.devicePixelRatio||1,2);
  decCanvas.style.width=cw+'px';decCanvas.style.height=ch+'px';
  decCanvas.width=cw*dpr;decCanvas.height=ch*dpr;
  draw46(decCanvas.getContext('2d'),decCanvas.width,decCanvas.height);
}

// Shared 4×6 renderer — used for both preview and final save
function draw46(ctx,W,H){
  // Background
  ctx.fillStyle='#fffaee';ctx.fillRect(0,0,W,H);
  // Dot pattern
  var dotSp=Math.round(W/50);

  ctx.strokeStyle='rgba(200,136,12,.3)';ctx.lineWidth=Math.max(1,bw/2);rr(ctx,bw*4,bw*4,W-bw*8,H-bw*8,W*.01);ctx.stroke();
  // Corner emojis
  var cs=Math.round(W*.028);

  var cm=W*.035;ctx.fillText('✨',cm,cm);ctx.fillText('🌙',W-cm,cm);ctx.fillText('🌟',cm,H-cm);ctx.fillText('⭐',W-cm,H-cm);
  // Top deco row
  ctx.font=Math.round(W*.017)+'px serif';
  ctx.fillText('🌙  ⭐  ✨  🕌  ✨  ⭐  🌙',W/2,H*.04);
  // Title
  ctx.fillStyle='#1a3a28';
  ctx.font='800 '+Math.round(W*.057)+'px "Baloo 2",sans-serif';
  ctx.fillText('Eid al-Fitr',W/2,H*.082);
  // Crescent accents
  ctx.font=Math.round(W*.035)+'px serif';
  ctx.fillText('🌙',W*.12,H*.08);ctx.fillText('🌙',W*.88,H*.08);
  // Date
  ctx.fillStyle='#c8880c';
  ctx.font='700 '+Math.round(W*.028)+'px "Baloo 2",sans-serif';
  ctx.fillText('March 20, 2026',W/2,H*.113);
  // Divider
  ctx.fillStyle='#c8880c';rr(ctx,W*.07,H*.126,W*.86,Math.max(2,H*.002),1);ctx.fill();
  // Second deco row
  ctx.font=Math.round(W*.014)+'px serif';
  ctx.fillText('🌺  💫  🎉  ✨  🎉  💫  🌺',W/2,H*.143);

  // ── 2×2 Photo grid
  var pTop=H*.155,pBot=H*.935,pH=pBot-pTop,pad=W*.037;
  var gap=W*.01,cW=Math.floor((W-pad*2-gap)/2),cH=Math.floor((pH-gap)/2);

    if(!img)return;
    var col=i%2,row=Math.floor(i/2);

    ctx.restore();
    ctx.strokeStyle='rgba(200,136,12,.3)';ctx.lineWidth=Math.max(1,W*.002);rr(ctx,ox,oy,cW,cH,W*.012);ctx.stroke();

    layers[i].forEach(function(s){ctx.save();ctx.translate(ox+s.xf*cW,oy+s.yf*cH);ctx.rotate(s.r*Math.PI/180);ctx.font=(s.sf*Math.min(cW,cH))+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(s.e,0,0);ctx.restore();});
  });

  // ── Drawing strokes
  renderAllStrokes(ctx,W,H);

  // Footer
  ctx.textAlign='center';ctx.fillStyle='#c8880c';ctx.font=Math.round(W*.02)+'px serif';
  ctx.fillText('🌙  ⭐  ✨  Eid Mubarak!  ✨  ⭐  🌙',W/2,H*.96);
  ctx.fillStyle='#8aaa90';ctx.font='600 '+Math.round(W*.015)+'px "Nunito",sans-serif';
  ctx.fillText('Thanks for Comming!',W/2,H*.98);
}

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ─── Finger Drawing System ──────────────────────────────
var drawStrokes=[]; // [{points:[{x,y}...], color, width}]
var drawMode=false;
var drawColor='#e04040';
var drawWidth=4;
var isDrawing=false;

function toggleDraw(){
  drawMode=!drawMode;

// Touch handlers for drawing on the preview canvas
(function(){
  var cv=document.getElementById('dec-preview');
  function getPos(e){
    var t=e.touches?e.touches[0]:e;
    var r=cv.getBoundingClientRect();
    // Normalize to 0-1 range so it scales to any render size
    return{x:(t.clientX-r.left)/r.width, y:(t.clientY-r.top)/r.height};
  }
  cv.addEventListener('touchstart',function(e){
    if(!drawMode)return;
    e.preventDefault();
    isDrawing=true;
    var p=getPos(e);
    drawStrokes.push({points:[p],color:drawColor,width:drawWidth});
    renderDrawLive();
  },{passive:false});
  cv.addEventListener('touchmove',function(e){
    if(!drawMode||!isDrawing)return;
    e.preventDefault();
    var p=getPos(e);
    var cur=drawStrokes[drawStrokes.length-1];
    if(cur)cur.points.push(p);
    renderDrawLive();
  },{passive:false});
  cv.addEventListener('touchend',function(){isDrawing=false;});
  cv.addEventListener('touchcancel',function(){isDrawing=false;});
  // Mouse fallback (for testing on desktop)
  cv.addEventListener('mousedown',function(e){
    if(!drawMode)return;
    isDrawing=true;
    var r=cv.getBoundingClientRect();
    var p={x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height};
    drawStrokes.push({points:[p],color:drawColor,width:drawWidth});
    renderDrawLive();
  });
  cv.addEventListener('mousemove',function(e){
    if(!drawMode||!isDrawing)return;
    var r=cv.getBoundingClientRect();
    var p={x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height};
    var cur=drawStrokes[drawStrokes.length-1];
    if(cur)cur.points.push(p);
    renderDrawLive();
  });
  cv.addEventListener('mouseup',function(){isDrawing=false;});
})();

// Fast live draw: just draw the current stroke on top (no full re-render)
function renderDrawLive(){
  var cv=decCanvas;
  var ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height;
  // Only redraw the latest stroke for performance
  var s=drawStrokes[drawStrokes.length-1];
  if(!s||s.points.length<2)return;
  ctx.save();
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=s.color;
  ctx.lineWidth=s.width*(W/300); // scale width to canvas
  ctx.beginPath();
  ctx.moveTo(s.points[0].x*W,s.points[0].y*H);
  for(var i=1;i<s.points.length;i++){
    ctx.lineTo(s.points[i].x*W,s.points[i].y*H);
  }
  ctx.stroke();
  ctx.restore();
}

// Full render with all strokes (used after undo, sticker add, etc.)
function renderAllStrokes(ctx,W,H){
  if(!drawStrokes.length)return;
  ctx.save();
  ctx.lineCap='round';ctx.lineJoin='round';
  for(var s=0;s<drawStrokes.length;s++){
    var st=drawStrokes[s];
    if(st.points.length<2)continue;
    ctx.strokeStyle=st.color;
    ctx.lineWidth=st.width*(W/300);
    ctx.beginPath();
    ctx.moveTo(st.points[0].x*W,st.points[0].y*H);
    for(var i=1;i<st.points.length;i++){
      ctx.lineTo(st.points[i].x*W,st.points[i].y*H);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// Detect Safari (no ctx.filter support = Safari, or check UA)
var isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);

// ── Save: render at full 1200×1800 and download
function saveStrip(){
  if(!photos.length)return;
  var c=document.createElement('canvas');c.width=1200;c.height=1800;
  draw46(c.getContext('2d'),1200,1800);
  try{c.toBlob(function(blob){
    if(!blob)return;
    // Always save to gallery
    saveToGallery(blob,function(){
      toast.classList.add('show');
      setTimeout(function(){toast.classList.remove('show');},3000);
    });
    // Download only on Chrome/Android — Safari opens it in a new tab which is annoying
    if(!isSafari){
      var u=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.download='eid-photo-'+Date.now()+'.jpg';
      a.href=u;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(u);},2000);
    }
    setTimeout(function(){goToSleep();},800);
  },'image/jpeg',0.95);}catch(e){console.error(e);}
}

// ─── IndexedDB ──────────────────────────────────────────
var DB='eid-booth-gallery',VER=1,ST='strips';
function odb(cb){var r=indexedDB.open(DB,VER);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(ST))d.createObjectStore(ST,{keyPath:'id',autoIncrement:true});};r.onsuccess=function(e){cb(null,e.target.result);};r.onerror=function(e){cb(e.target.error,null);};}
function saveToGallery(blob,done){odb(function(err,db){if(err||!db){if(done)done();return;}var tx=db.transaction(ST,'readwrite');tx.objectStore(ST).add({blob:blob,time:Date.now()});tx.oncomplete=function(){updateGalleryCount();if(done)done();};tx.onerror=function(){if(done)done();};});}
function getAllFromGallery(cb){odb(function(err,db){if(err||!db){cb([]);return;}var tx=db.transaction(ST,'readonly');var req=tx.objectStore(ST).getAll();req.onsuccess=function(){cb(req.result||[]);};req.onerror=function(){cb([]);};});}
function deleteFromGallery(id,cb){odb(function(err,db){if(err||!db){if(cb)cb();return;}var tx=db.transaction(ST,'readwrite');tx.objectStore(ST).delete(id);tx.oncomplete=function(){updateGalleryCount();if(cb)cb();};tx.onerror=function(){if(cb)cb();};});}
function updateGalleryCount(){odb(function(err,db){if(err||!db)return;var tx=db.transaction(ST,'readonly');var req=tx.objectStore(ST).count();req.onsuccess=function(){var el=document.getElementById('gal-count');if(el)el.textContent=req.result||0;};});}
updateGalleryCount();

function openGallery(){document.getElementById('gallery').classList.add('open');renderGallery();}
function closeGallery(){document.getElementById('gallery').classList.remove('open');galUrls.forEach(function(u){try{URL.revokeObjectURL(u);}catch(e){}});galUrls=[];}
var galUrls=[];
function renderGallery(){
  var g=document.getElementById('gal-grid');g.innerHTML='<div class="gal-empty"><span class="gal-empty-icon">📸</span><span class="gal-empty-text">Loading...</span></div>';
  getAllFromGallery(function(items){
    galUrls.forEach(function(u){try{URL.revokeObjectURL(u);}catch(e){}});galUrls=[];
    if(!items.length){g.innerHTML='<div class="gal-empty"><span class="gal-empty-icon">📸</span><span class="gal-empty-text">No photos yet!<br>Take some photos and tap Save.</span></div>';return;}
    items.sort(function(a,b){return b.time-a.time;});g.innerHTML='';
    items.forEach(function(item){var url=URL.createObjectURL(item.blob);galUrls.push(url);var d=new Date(item.time),ts=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});var div=document.createElement('div');div.className='gal-item';div.innerHTML='<img src="'+url+'"><div class="gal-item-overlay"><span class="gal-item-time">'+ts+'</span><button class="gal-del-btn">🗑 Delete</button></div>';div.querySelector('img').onclick=function(e){e.stopPropagation();openPreview(item.id,url);};div.querySelector('.gal-del-btn').onclick=function(e){e.stopPropagation();deleteFromGallery(item.id,function(){renderGallery();});};g.appendChild(div);});
  });
}
var prevCur={id:null};
function openPreview(id,url){prevCur={id:id};document.getElementById('preview-img').src=url;document.getElementById('preview').classList.add('open');}
function closePreview(){document.getElementById('preview').classList.remove('open');prevCur={id:null};}
function deletePreview(){if(prevCur.id!=null)deleteFromGallery(prevCur.id,function(){closePreview();renderGallery();});}

function resetAll(){photos.forEach(function(u){if(u&&u.indexOf('blob:')===0)try{URL.revokeObjectURL(u);}catch(e){}});photos=[];layers=[[],[],[],[]];photoImgs=[null,null,null,null];drawStrokes=[];drawMode=false;stopFxLoop();curFilter='sunny';vid.className='f-sunny';document.querySelectorAll('.fb').forEach(function(x){x.classList.remove('on');});var firstFb=document.querySelector('.fb[data-f="sunny"]');if(firstFb)firstFb.classList.add('on');var dt=document.getElementById('draw-toggle');if(dt)dt.classList.remove('active');busy=false;shutbtn.classList.remove('busy');viewbtn.style.display='none';updateDots();document.getElementById('dec').classList.remove('open');}
